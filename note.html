<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#faf7f2" />
  <title>Pen To Text — Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header>
  <!-- Sidebar toggle (mobile) -->
  <button id="sidebarToggle" title="Toggle categories">☰</button>

  <h1>Pen To Text</h1>

  <div class="header-controls">
    <input id="searchBar" type="text" placeholder="Search notes…" autocomplete="off" />

    <select id="sortNotes" title="Sort notes">
      <option value="dateDesc">Date (Newest)</option>
      <option value="dateAsc">Date (Oldest)</option>
      <option value="titleAsc">Title (A → Z)</option>
      <option value="titleDesc">Title (Z → A)</option>
      <option value="editedDesc">Last Edited (Newest)</option>
      <option value="editedAsc">Last Edited (Oldest)</option>
      <option value="wordCountDesc">Word Count (High → Low)</option>
      <option value="wordCountAsc">Word Count (Low → High)</option>
      <option value="color">🎨 Group by Color</option>
    </select>

    <button id="voiceBtn" title="Voice to Text">🎤</button>
    <button id="addNoteBtn">+ Add Note</button>
    <button id="viewArchivedBtn">📦 Archive</button>
    <button id="viewDeletedBtn">🗑 Trash</button>
    <button id="undoBtn" style="display:none;">↩ Undo</button>
    <button id="themeToggle" title="Toggle theme">🌙</button>
    <button id="customizeBtn" title="Customize">⚙️</button>
    <a href="games.html" title="Play Zone" style="padding:0 14px;height:38px;border-radius:9999px;border:1.5px solid rgba(240,235,224,0.15);background:transparent;color:#8a7f70;font-size:13px;display:inline-flex;align-items:center;text-decoration:none;transition:all .2s;">🎮 Games</a>
    <a href="index.html" title="Homepage">← Home</a>

    <!-- Mobile overflow menu button -->
    <button id="mobileMenuBtn" title="More options">⋯</button>
  </div>
</header>

<!-- Mobile drawer (hidden until mobileMenuBtn clicked) -->
<div id="mobileDrawer">
  <div class="drawer-row">
    <button id="drawerAddBtn" class="drawer-add">+ Add Note</button>
    <button id="drawerVoiceBtn" class="drawer-voice">🎤 Voice</button>
  </div>
  <div class="drawer-row">
    <button id="drawerArchivedBtn">📦 Archive</button>
    <button id="drawerDeletedBtn">🗑 Trash</button>
  </div>
  <div class="drawer-row">
    <button id="drawerThemeBtn">🌙 Theme</button>
    <button id="drawerCustomizeBtn">⚙️ Settings</button>
    <a href="index.html">← Home</a>
  </div>
</div>

<!-- Sidebar overlay (mobile tap-to-close) -->
<div id="sidebarOverlay"></div>

<!-- ============================================================
     MAIN LAYOUT
     ============================================================ -->
<div class="container">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">Categories</div>

    <input id="categorySearch" type="text" placeholder="Filter…" />

    <div class="add-category">
      <input id="newCategoryInput" type="text" placeholder="New category…" />
      <input id="categoryColorPicker" type="color" value="#4ea8ff" title="Color" />
      <button id="addCategoryBtn" title="Add">+</button>
    </div>

    <ul id="categoryList"></ul>

    <p class="sidebar-hint">
      Click a category to filter · ✏️ rename · × delete
    </p>
  </aside>

  <!-- Notes area -->
  <main id="mainArea">
    <!-- View bar (title + note count) -->
    <div class="view-bar">
      <h2 class="view-title" id="viewTitle">All Notes</h2>
      <span class="view-count" id="viewCount">0 notes</span>
    </div>

    <!-- Rotating inspirational quote -->
    <div id="appQuoteBanner" style="
      display:flex; align-items:center; gap:8px;
      margin: 0 0 16px;
      padding: 10px 16px;
      background: rgba(201,151,74,0.07);
      border: 1px solid rgba(201,151,74,0.18);
      border-radius: 10px;
      font-size: 12.5px;
      font-style: italic;
      color: var(--muted);
      transition: opacity 0.5s ease;
    ">
      <span style="font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);line-height:1;flex-shrink:0;">"</span>
      <span id="appQuoteText">The secret of getting ahead is getting started.</span>
    </div>

    <div id="notesContainer" class="notes-grid"></div>
  </main>

</div>

<!-- ============================================================
     MODAL — Add / Edit Note
     ============================================================ -->
<div id="noteModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal-content">
    <button class="close" id="closeModal" aria-label="Close">&times;</button>
    <h2 id="modalTitle">Add Note</h2>

    <input id="noteTitle" type="text" placeholder="Title (optional)" />

    <label>Categories</label>
    <div id="noteCategoryOptions"></div>

    <label>Note Color <small>— overrides category color</small></label>
    <input id="noteColorPicker" type="color" value="#ffffff" />

    <label>Image <small>— optional</small></label>
    <input id="noteImage" type="file" accept="image/*" />

    <label>Content</label>
    <textarea id="noteContent" placeholder="Write your note…"></textarea>

    <div class="modal-actions">
      <button id="modalVoiceBtn" title="Voice to Text">🎤</button>
      <button id="saveNoteBtn" class="btn-primary">Save</button>
      <button id="cancelBtn" class="btn-ghost">Cancel</button>
    </div>
  </div>
</div>

<!-- ============================================================
     MODAL — Customize
     ============================================================ -->
<div id="customizeModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal-content">
    <button class="close" id="closeCustomize" aria-label="Close">&times;</button>
    <h2>Settings</h2>

    <label>Default Category Color</label>
    <input id="defaultCategoryColor" type="color" value="#4ea8ff" />

    <label>Default Note Color</label>
    <input id="defaultNoteColor" type="color" value="#ffffff" />

    <div class="modal-actions">
      <button id="applyCustomizationBtn" class="btn-primary">Apply</button>
      <button id="resetDataBtn" class="btn-danger">Reset All Data</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  /* ============================================================
     Mobile UI wiring — sidebar toggle & mobile drawer
     ============================================================ */

  const sidebar        = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const sidebarToggle  = document.getElementById('sidebarToggle');
  const mobileMenuBtn  = document.getElementById('mobileMenuBtn');
  const mobileDrawer   = document.getElementById('mobileDrawer');

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });

  sidebarOverlay.addEventListener('click', closeSidebar);

  // Close sidebar when a category is chosen on mobile
  document.getElementById('categoryList').addEventListener('click', () => {
    if (window.innerWidth <= 680) closeSidebar();
  });

  // Mobile drawer
  let drawerOpen = false;
  mobileMenuBtn.addEventListener('click', () => {
    drawerOpen = !drawerOpen;
    mobileDrawer.classList.toggle('open', drawerOpen);
  });

  // Close drawer when clicking outside
  document.addEventListener('click', e => {
    if (drawerOpen && !mobileDrawer.contains(e.target) && e.target !== mobileMenuBtn) {
      drawerOpen = false;
      mobileDrawer.classList.remove('open');
    }
  });

  // Wire drawer buttons to the same functions as desktop buttons
  document.getElementById('drawerAddBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('addNoteBtn').click();
  });

  document.getElementById('drawerVoiceBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('voiceBtn').click();
  });

  document.getElementById('drawerArchivedBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('viewArchivedBtn').click();
  });

  document.getElementById('drawerDeletedBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('viewDeletedBtn').click();
  });

  document.getElementById('drawerThemeBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('themeToggle').click();
  });

  document.getElementById('drawerCustomizeBtn').addEventListener('click', () => {
    mobileDrawer.classList.remove('open');
    drawerOpen = false;
    document.getElementById('customizeBtn').click();
  });

  /* ============================================================
     View bar updates — patch renderNotes to update title/count
     ============================================================ */
  const _origRenderNotes = window.renderNotes;
  if (typeof renderNotes !== 'undefined') {
    const _orig = renderNotes;
    window.renderNotes = function() {
      _orig();
      updateViewBar();
    };
  }

  function updateViewBar() {
    const titleEl = document.getElementById('viewTitle');
    const countEl = document.getElementById('viewCount');
    if (!titleEl || !countEl) return;

    const cards = document.querySelectorAll('#notesContainer .note-card');
    const n = cards.length;

    // Figure out current view name
    let title = 'All Notes';
    if (typeof showingArchived !== 'undefined' && showingArchived) title = 'Archive';
    else if (typeof showingDeleted !== 'undefined' && showingDeleted) title = 'Trash';
    else if (typeof currentCategory !== 'undefined' && currentCategory && currentCategory !== 'All Notes') title = currentCategory;

    titleEl.textContent = title;
    countEl.textContent = n === 1 ? '1 note' : `${n} notes`;
  }

  // Call once after app init
  setTimeout(updateViewBar, 100);

  // Also update on any category click
  document.getElementById('categoryList').addEventListener('click', () => setTimeout(updateViewBar, 80));
  document.getElementById('searchBar').addEventListener('input', () => setTimeout(updateViewBar, 280));

  /* ============================================================
     Rotating inspirational quotes
     ============================================================ */
  const APP_QUOTES = [
    "The secret of getting ahead is getting started.",
    "A small note today is a big idea tomorrow.",
    "Write it down. Your future self will thank you.",
    "Ideas are worthless until you capture them.",
    "The palest ink is better than the best memory.",
    "You don't have to be great to start, but you have to start to be great.",
    "Every expert was once a beginner who kept notes.",
    "Clarity comes from writing, not just thinking.",
    "Your brain is for having ideas, not storing them.",
    "One idea written down is worth a thousand remembered.",
    "Progress is made one note at a time.",
    "Capture everything. You'll know what matters later.",
    "Good notes today make great decisions tomorrow.",
    "The more you write, the clearer your thinking becomes.",
    "Don't just dream it — write it, plan it, do it.",
    "Knowledge grows when it's written down and revisited.",
    "Every great journey begins with a single written step.",
    "Words on paper outlive the thoughts in your head.",
    "Keep a notebook. Travel with it. Create in it. Share it.",
    "Organization is not about perfection — it's about efficiency.",
  ];

  const appQuoteEl = document.getElementById('appQuoteText');
  const appQuoteBanner = document.getElementById('appQuoteBanner');
  let appQuoteIdx = Math.floor(Math.random() * APP_QUOTES.length);

  function rotateAppQuote() {
    appQuoteBanner.style.opacity = '0';
    setTimeout(() => {
      appQuoteIdx = (appQuoteIdx + 1) % APP_QUOTES.length;
      appQuoteEl.textContent = APP_QUOTES[appQuoteIdx];
      appQuoteBanner.style.opacity = '1';
    }, 500);
  }

  if (appQuoteEl) appQuoteEl.textContent = APP_QUOTES[appQuoteIdx];
  setInterval(rotateAppQuote, 7000);
</script>

</body>
</html>
